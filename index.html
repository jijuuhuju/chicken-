<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チキン</title>
    
    <!-- 🐔 ファビコン設定 -->
    <link rel="icon" href="chicken.ico" type="image/x-icon">
    
    <style>
        /* 初期の無害な画面スタイル */
        body {
            background-color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            cursor: pointer; /* どこを押してもいいように全体をカーソル化 */
            user-select: none;
            transition: background-color 0.05s;
        }

        /* 「画面をタップして」という静かな指示 */
        .instruction {
            font-size: 1.8rem;
            color: #555555;
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse 2s infinite; /* じんわり点滅させてタップを促す */
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* タップ後の凶悪な超高速画面シェイク */
        @keyframes violentShake {
            0% { transform: translate(5px, 5px) rotate(0deg); }
            10% { transform: translate(-5px, -8px) rotate(-3deg); }
            20% { transform: translate(-10px, 0px) rotate(3deg); }
            30% { transform: translate(0px, 8px) rotate(0deg); }
            40% { transform: translate(5px, -5px) rotate(3deg); }
            50% { transform: translate(-5px, 8px) rotate(-3deg); }
            60% { transform: translate(-10px, 5px) rotate(0deg); }
            70% { transform: translate(8px, 5px) rotate(-3deg); }
            80% { transform: translate(-5px, -5px) rotate(3deg); }
            90% { transform: translate(8px, 8px) rotate(0deg); }
            100% { transform: translate(5px, -8px) rotate(-3deg); }
        }
        .shaking { animation: violentShake 0.05s infinite; }

        /* 四方八方に吹き飛ぶチキン（ファビコン画像） */
        .flying-favicon {
            position: absolute;
            z-index: 2;
            pointer-events: none;
            animation: flyAway 1.5s linear forwards;
        }
        @keyframes flyAway {
            0% { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(var(--scale)); opacity: 0; }
        }

        /* マウス移動・指のドラッグで大爆発するチキンの粒 */
        .mouse-explosion-particle {
            position: absolute;
            z-index: 999;
            pointer-events: none;
            animation: explodeParticle 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes explodeParticle {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--ex), var(--ey)) rotate(var(--erot)) scale(0.2); opacity: 0; }
        }
    </style>
</head>
<body id="virus-body">

    <!-- 画面中央に表示される唯一の文字（タップ後に完全に消滅します） -->
    <div class="instruction" id="tap-text">画面をタップして</div>

    <script>
        const chickenSounds = ['chicken1.mp3', 'chicken2.mp3', 'chicken3.mp3'];
        const body = document.getElementById('virus-body');
        const tapText = document.getElementById('tap-text');
        
        let isInfected = false;

        // 🌟 本家を再現した凶悪な「カラフル超高速点滅」
        function startFlashing() {
            const colors = ['#ff0000', '#000000', '#ffff00', '#ff0055', '#00ff00', '#0000ff', '#ffffff'];
            setInterval(() => {
                body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            }, 60); // 0.06秒ごとに狂ったように背景色が変わる
        }

        // 🌟 画面中央からチキン（ファビコン画像）が無限に吹き飛び続ける
        function spawnFlyingFavicon() {
            const img = document.createElement('img');
            img.src = 'chicken.ico';
            img.className = 'flying-favicon';
            
            // 画面の真ん中から発生
            img.style.left = (window.innerWidth / 2 - 25) + 'px';
            img.style.top = (window.innerHeight / 2 - 25) + 'px';

            const size = Math.floor(Math.random() * 100) + 40;
            img.style.width = size + 'px'; img.style.height = size + 'px';

            const angle = Math.random() * Math.PI * 2;
            const distance = Math.floor(Math.random() * 500) + 300;
            img.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            img.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
            img.style.setProperty('--rot', (Math.random() * 1080 - 540) + 'deg');
            img.style.setProperty('--scale', (Math.random() * 1.8 + 0.5));

            body.appendChild(img);
            setTimeout(() => { img.remove(); }, 1500);
        }

        // 🌟 指を動かす・マウスを動かすとチキンが弾けて大爆発
        function createMouseExplosion(e) {
            if (!isInfected) return;
            
            // タッチ操作（スマホ）とマウス操作（PC）の両方に対応
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            for (let i = 0; i < 6; i++) {
                const particle = document.createElement('img');
                particle.src = 'chicken.ico';
                particle.className = 'mouse-explosion-particle';
                particle.style.left = (clientX - 20) + 'px';
                particle.style.top = (clientY - 20) + 'px';
                particle.style.width = '45px';
                particle.style.height = '45px';

                const angle = Math.random() * Math.PI * 2;
                const speed = Math.floor(Math.random() * 200) + 60;
                particle.style.setProperty('--ex', Math.cos(angle) * speed + 'px');
                particle.style.setProperty('--ey', Math.sin(angle) * speed + 'px');
                particle.style.setProperty('--erot', (Math.random() * 400 - 200) + 'deg');

                body.appendChild(particle);
                setTimeout(() => { particle.remove(); }, 600);
            }
        }

        // 🌟 チキンの鳴き声が自動で増殖・重なり続けるパンデミックオーディオ
        function startAudioPandemic() {
            function scheduleNextSound() {
                const randomIndex = Math.floor(Math.random() * chickenSounds.length);
                const audio = new Audio(chickenSounds[randomIndex]);
                audio.volume = 1.0; 
                audio.play().catch(err => console.log("再生制限回避"));

                // 0.3秒〜1秒の間隔で次のチキンが自動予約される
                const nextDelay = Math.floor(Math.random() * (1000 - 300 + 1)) + 300;
                setTimeout(scheduleNextSound, nextDelay);
            }
            scheduleNextSound();
            scheduleNextSound(); // 初速を上げるために2重でスタート
        }

        // 画面のどこかを「タップ（クリック）」した瞬間に発症
        function triggerInfection() {
            if (isInfected) return;
            isInfected = true;

            // 「画面をタップして」の文字を完全に削除して逃げ道を消す
            tapText.remove();

            // 狂気の地獄絵図を一斉に解き放つ
            body.classList.add('shaking'); // 強烈な画面振動
            startFlashing();               // カラフル超高速点滅
            startAudioPandemic();          // 音声自動増殖ループ
            
            // 0.15秒ごとに中央からチキンを大噴出
            setInterval(spawnFlyingFavicon, 150);

            // PCのマウス移動と、スマホの画面スワイプ（タッチ移動）の両方に爆発をセット
            window.addEventListener('mousemove', createMouseExplosion);
            window.addEventListener('touchmove', createMouseExplosion);
        }

        // イベント登録
        body.addEventListener('click', triggerInfection);
        body.addEventListener('touchstart', triggerInfection);
    </script>
</body>
</html>
