<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チキン・ファイターズ</title>
    
    <!-- 🐔 ファビコン設定 -->
    <link rel="icon" href="chicken.ico" type="image/x-icon">
    
    <style>
        body {
            background-color: #ffe0b2; /* ケンカの舞台っぽい土・砂色のイメージ */
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        /* 画面をタップして */
        .instruction {
            font-size: 1.8rem;
            color: #d84315;
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
            z-index: 100;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* 走り回るニワトリ（chicken.ico）のスタイル */
        .chicken-fighter {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 10;
            will-change: transform;
            transition: transform 0.1s linear;
        }

        /* 衝突したときに出る喧嘩エフェクト（💥） */
        .clash-effect {
            position: absolute;
            font-size: 3rem;
            z-index: 50;
            pointer-events: none;
            animation: clashPop 0.3s ease-out forwards;
        }
        @keyframes clashPop {
            0% { transform: scale(0.3); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body id="arena">

    <div class="instruction" id="tap-text">画面をタップして</div>

    <script>
        const chickenSounds = ['chicken1.mp3', 'chicken2.mp3', 'chicken3.mp3'];
        const arena = document.getElementById('arena');
        const tapText = document.getElementById('tap-text');
        
        let isStarted = false;
        const chickens = [];
        const chickenSize = 60; // ニワトリの縦横サイズ

        // ニワトリオブジェクトのクラス定義
        class Chicken {
            constructor() {
                this.element = document.createElement('img');
                this.element.src = 'chicken.ico';
                this.element.className = 'chicken-fighter';
                
                // 初期位置（画面内のランダム）
                this.x = Math.random() * (window.innerWidth - chickenSize);
                this.y = Math.random() * (window.innerHeight - chickenSize);
                
                // 移動速度と向き（ランダム）
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 3; // スピード調整
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                arena.appendChild(this.element);
                this.updatePosition();
            }

            // 位置を反映（向きに応じて反転させる）
            updatePosition() {
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                
                // 進む方向（左右）に合わせて画像の向きを変える
                if (this.vx > 0) {
                    this.element.style.transform = 'scaleX(-1)'; // 右を向く
                } else {
                    this.element.style.transform = 'scaleX(1)';  // 左を向く
                }
            }

            // 移動ロジック
            move() {
                this.x += this.vx;
                this.y += this.vy;

                // 画面の端（壁）にぶつかったら跳ね返る
                if (this.x <= 0) { this.x = 0; this.vx *= -1; }
                if (this.x >= window.innerWidth - chickenSize) { this.x = window.innerWidth - chickenSize; this.vx *= -1; }
                if (this.y <= 0) { this.y = 0; this.vy *= -1; }
                if (this.y >= window.innerHeight - chickenSize) { this.y = window.innerHeight - chickenSize; this.vy *= -1; }

                this.updatePosition();
            }
        }

        // 💥 喧嘩（衝突）エフェクトを発生させて音を鳴らす関数
        function playClash(x, y) {
            // 衝突位置の中央に 💥 を出す
            const clash = document.createElement('div');
            clash.className = 'clash-effect';
            clash.textContent = '💥';
            clash.style.left = (x + chickenSize / 2 - 25) + 'px';
            clash.style.top = (y + chickenSize / 2 - 25) + 'px';
            arena.appendChild(clash);
            setTimeout(() => clash.remove(), 300);

            // 0.3秒(300ms) から 1秒(1000ms) のランダムな遅延ののち、多重再生
            const randomDelay = Math.floor(Math.random() * (1000 - 300 + 1)) + 300;
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * chickenSounds.length);
                const audio = new Audio(chickenSounds[randomIndex]);
                audio.play().catch(e => console.log("再生ブロック回避"));
            }, randomDelay);
        }

        // 全ニワトリの移動と「衝突判定」を行うループ（毎フレーム実行）
        function animationLoop() {
            // 1. 全員を動かす
            chickens.forEach(c => c.move());

            // 2. 総当たりでニワトリ同士の衝突をチェック
            for (let i = 0; i < chickens.length; i++) {
                for (let j = i + 1; j < chickens.length; j++) {
                    const c1 = chickens[i];
                    const c2 = chickens[j];

                    // 円形または矩形での簡易的な当たり判定
                    const dx = (c1.x + chickenSize/2) - (c2.x + chickenSize/2);
                    const dy = (c1.y + chickenSize/2) - (c2.y + chickenSize/2);
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    // もし2匹の距離がサイズ以下（ぶつかった）なら
                    if (distance < chickenSize - 10) {
                        // 喧嘩エフェクトとサウンドをトリガー
                        playClash((c1.x + c2.x)/2, (c1.y + c2.y)/2);

                        // 反転させて跳ね返す（擬似的な物理衝突）
                        const tempVx = c1.vx;
                        const tempVy = c1.vy;
                        c1.vx = c2.vx;
                        c1.vy = c2.vy;
                        c2.vx = tempVx;
                        c2.vy = tempVy;

                        // めり込み防止のために少し位置をずらす
                        c1.x += c1.vx; c1.y += c1.vy;
                        c2.x += c2.vx; c2.y += c2.vy;
                    }
                }
            }

            requestAnimationFrame(animationLoop);
        }

        // 画面タップで戦闘開始
        function startChickenWar() {
            if (isStarted) return;
            isStarted = true;

            // 文字を消す
            tapText.remove();

            // 最初に20匹のニワトリファイターを一気に解き放つ
            for (let i = 0; i < 20; i++) {
                chickens.push(new Chicken());
            }

            // ループ処理を起動
            requestAnimationFrame(animationLoop);
        }

        arena.addEventListener('click', startChickenWar);
        arena.addEventListener('touchstart', startChickenWar);
    </script>
</body>
</html>
